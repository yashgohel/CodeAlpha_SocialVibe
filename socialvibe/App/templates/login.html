<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Vibe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-color: #121420;
      --card-bg: rgba(30, 32, 48, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --primary-accent: #7b42f6;
      --primary-gradient: linear-gradient(135deg, #a855f7, #6366f1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: "Inter", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Glowing ambient background */
      background-image:
        radial-gradient(circle at 15% 50%,
          rgba(123, 66, 246, 0.15),
          transparent 35%),
        radial-gradient(circle at 85% 30%,
          rgba(99, 102, 241, 0.15),
          transparent 35%);
    }

    /* Glassmorphism Card */
    .vibe-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* Form Controls */
    .form-control-vibe {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 1rem;
      color: var(--text-main);
      padding: 0.8rem 1.2rem;
      transition: all 0.3s ease;
    }

    .form-control-vibe:focus {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--primary-accent);
      box-shadow: 0 0 0 0.25rem rgba(123, 66, 246, 0.15);
      color: var(--text-main);
    }

    .form-control-vibe::placeholder {
      color: rgba(148, 163, 184, 0.6);
    }

    /* Buttons */
    .btn-gradient {
      background: var(--primary-gradient);
      color: white;
      border: none;
      border-radius: 1rem;
      padding: 0.8rem 1.5rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .btn-gradient:hover {
      opacity: 0.9;
      color: white;
    }

    .btn-social {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      border-radius: 1rem;
      padding: 0.7rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .btn-social:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
    }

    /* Custom Toggle Pills */
    .nav-pills {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 1.2rem;
      padding: 0.3rem;
    }

    .nav-pills .nav-link {
      color: var(--text-muted);
      border-radius: 1rem;
      font-weight: 500;
      padding: 0.6rem 1rem;
      transition: all 0.3s ease;
    }

    .nav-pills .nav-link.active {
      background: var(--primary-gradient);
      color: white;
    }

    /* Custom Checkbox */
    .form-check-input {
      background-color: rgba(255, 255, 255, 0.1);
      border-color: var(--border-color);
    }

    .form-check-input:checked {
      background-color: var(--primary-accent);
      border-color: var(--primary-accent);
    }

    .text-accent {
      color: #a855f7;
      text-decoration: none;
      transition: color 0.2s;
    }

    .text-accent:hover {
      color: #c084fc;
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }

    .divider:not(:empty)::before {
      margin-right: 0.5em;
    }

    .divider:not(:empty)::after {
      margin-left: 0.5em;
    }
  </style>
</head>

<body>
  <div class="container d-flex justify-content-center px-3">
    <div class="vibe-card p-4 p-sm-5">
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center bg-dark bg-opacity-50 rounded-circle mb-3"
          style="
              width: 60px;
              height: 60px;
              border: 1px solid var(--border-color);
            ">
          <i class="bi bi-layers-fill fs-2" style="color: #a855f7"></i>
        </div>
        <h3 class="fw-bold mb-1">Welcome to Social Vibe</h3>
        <p style="font-size: 0.9rem">Connect with your network.</p>

        {% if messages %}
        <div class="mt-3">
          {% for message in messages %}
          <div
            class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} bg-opacity-10 border-0 small rounded-3 mb-2"
            role="alert">
            {{ message }}
          </div>
          {% endfor %}
        </div>
        {% endif %}
      </div>

      <ul class="nav nav-pills nav-justified mb-4" id="auth-tabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="login-tab" data-bs-toggle="pill" data-bs-target="#login-content"
            type="button" role="tab" aria-controls="login-content" aria-selected="true">
            Sign In
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="signup-tab" data-bs-toggle="pill" data-bs-target="#signup-content" type="button"
            role="tab" aria-controls="signup-content" aria-selected="false">
            Create Account
          </button>
        </li>
      </ul>

      <div class="tab-content" id="auth-tabs-content">
        <div class="tab-pane fade show active" id="login-content" role="tabpanel" aria-labelledby="login-tab">
          <form method="post">
            {% csrf_token %}
            <input type="hidden" name="action" value="login">

            <div class="mb-3">
              <label class="form-label small ms-1">Email Address</label>
              <div class="position-relative">
                <i class="bi bi-envelope position-absolute top-50 translate-middle-y ms-3"></i>
                <input type="email" class="form-control form-control-vibe ps-5" placeholder="emma@example.com"
                  name="email" required />
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label small ms-1">Password</label>
              <div class="position-relative">
                <i class="bi bi-lock position-absolute top-50 translate-middle-y ms-3"></i>
                <input type="password" class="form-control form-control-vibe ps-5" placeholder="••••••••"
                  name="password" required />
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe" />
                <label class="form-check-label small" for="rememberMe">Remember me</label>
              </div>
              <a href="#" class="text-accent small" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Forgot
                password?</a>
            </div>

            <button type="submit" class="btn btn-gradient w-100 mb-4">
              Sign In
            </button>
          </form>
        </div>

        <div class="tab-pane fade" id="signup-content" role="tabpanel" aria-labelledby="signup-tab">
          <form method="post">
            {% csrf_token %}
            <input type="hidden" name="action" value="signup">

            <div class="mb-3">
              <label class="form-label small ms-1">Full Name</label>
              <div class="position-relative">
                <i class="bi bi-person position-absolute top-50 translate-middle-y ms-3"></i>
                <input type="text" class="form-control form-control-vibe ps-5" placeholder="Emma Johnson"
                  name="fullname" required />
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label small ms-1">Email Address</label>
              <div class="position-relative">
                <i class="bi bi-envelope position-absolute top-50 translate-middle-y ms-3"></i>
                <input type="email" class="form-control form-control-vibe ps-5" placeholder="emma@example.com"
                  name="email" required />
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label small ms-1">Password</label>
              <div class="position-relative">
                <i class="bi bi-shield-lock position-absolute top-50 translate-middle-y ms-3"></i>
                <input type="password" class="form-control form-control-vibe ps-5"
                  placeholder="Create a strong password" name="password" required />
              </div>
            </div>

            <div class="form-check mb-4 mt-2">
              <input class="form-check-input" type="checkbox" id="termsCheck" required />
              <label class="form-check-label small" for="termsCheck">
                I agree to the <a href="#" class="text-accent">Terms</a> &
                <a href="#" class="text-accent">Privacy Policy</a>
              </label>
            </div>

            <button type="submit" class="btn btn-gradient w-100 mb-4">
              Create Account
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content vibe-card border-0 shadow-lg" style="max-width: 100%;">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold">Reset Password</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form method="POST">
          {% csrf_token %}
          <input type="hidden" name="action" value="forgot_password">
          <div class="modal-body p-4">
            <div class="mb-3">
              <label class="form-label small ms-1">Email Address</label>
              <input type="email" name="email" class="form-control form-control-vibe" placeholder="emma@example.com"
                required>
            </div>
            <div class="mb-3">
              <label class="form-label small ms-1">New Password</label>
              <input type="password" name="new_password" class="form-control form-control-vibe" placeholder="••••••••"
                required>
            </div>
            <div class="mb-3">
              <label class="form-label small ms-1">Confirm New Password</label>
              <input type="password" name="confirm_new_password" class="form-control form-control-vibe"
                placeholder="••••••••" required>
            </div>
          </div>
          <div class="modal-footer border-0 p-4 pt-0">
            <button type="button" class="btn btn-link text-muted text-decoration-none me-auto"
              data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-gradient px-4">Reset Password</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
